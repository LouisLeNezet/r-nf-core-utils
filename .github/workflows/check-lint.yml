## Acronyms:
## * GHA: GitHub Action
## * OS: operating system

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

name: R-CMD-check

permissions: read-all

env:
  has_testthat: 'true'
  run_covr: 'true'

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      ## Most of these steps are the same as the ones in
      ## https://github.com/r-lib/actions/blob/master/examples/check-standard.yaml
      ## If they update their steps, we will also need to update ours.
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
      
      - name: Lint
        run: |
          lintr::lint_package(
            linters = lintr::linters_with_defaults(
              lintr::indentation_linter(indent = 4L),
              lintr::cyclocomp_linter(complexity_limit = 55L)
            )
          )
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

      - name: Test coverage
        if: env.run_covr == 'true' && runner.os == 'Linux'
        env:
          SKIP_SHINY_TESTS: "TRUE"
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        if: env.run_covr == 'true' && runner.os == 'Linux'
        with:
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Debug check
        if : failure()
        run: find . -name 00check.log -exec cat '{}' ';'
